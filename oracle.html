<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Oracle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#08070c;
    --void-2:#0f0d17;
    --cyan:#4beeff;
    --magenta:#ff3ea5;
    --violet:#7b5cff;
    --ink:#f5f3ff;
    --dim:#8a8698;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    margin:0;
    background:radial-gradient(ellipse at 50% 30%, var(--void-2), var(--void) 70%);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    width:100vw;
    user-select:none;
  }

  .mirror-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    transform:scaleX(-1);
    opacity:0;
    transition:opacity 0.6s ease;
    z-index:0;
  }
  .mirror-video.active{ opacity:0.55; }

  .mirror-tint{
    position:fixed;
    inset:0;
    background:radial-gradient(ellipse at 50% 30%, rgba(15,13,23,0.35), rgba(8,7,12,0.75) 75%);
    z-index:1;
    pointer-events:none;
    opacity:0;
    transition:opacity 0.6s ease;
  }
  .mirror-tint.active{ opacity:1; }

  .stage{
    position:relative;
    z-index:2;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:28px;
    width:100%;
    max-width:640px;
    padding:24px;
  }

  .phantom-wrap{
    position:relative;
    width:min(64vw, 380px);
    height:min(43vw, 258px);
  }

  .phantom-svg{
    width:100%;
    height:100%;
    overflow:visible;
    animation: float 6s ease-in-out infinite;
    transition: opacity 0.5s ease;
  }
  @keyframes float{
    0%,100%{ transform:translateY(0); }
    50%{ transform:translateY(-14px); }
  }

  .halo{ transition: opacity 0.5s ease; }

  /* state: passive — dim, waiting for wake word */
  body[data-state="passive"] .phantom-svg{ opacity:0.85; }
  body[data-state="passive"] .halo{ opacity:0.08; }

  /* state: listening — holds still, leans in slightly */
  body[data-state="listening"] .phantom-svg{ animation:none; transform:scale(1.05) translateY(0); }

  /* state: thinking — slow pondering tilt */
  body[data-state="thinking"] .phantom-svg{ animation: think-tilt-avatar 2.6s ease-in-out infinite; }
  @keyframes think-tilt-avatar{
    0%,100%{ transform:rotate(-3deg); }
    50%{ transform:rotate(3deg); }
  }

  /* state: speaking — holds still, mouth motion is handled by startTalking()/stopTalking() */
  body[data-state="speaking"] .phantom-svg{ animation:none; transform:scale(1) translateY(0); }

  .status{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--dim);
    min-height:16px;
  }

  .transcript{
    font-family:'Space Grotesk', sans-serif;
    font-size:clamp(18px, 3.4vw, 26px);
    font-weight:500;
    text-align:center;
    line-height:1.4;
    max-width:560px;
    min-height:1.4em;
    color:var(--ink);
  }
  .transcript.you{ color:var(--dim); font-family:'IBM Plex Sans',sans-serif; font-weight:400; font-size:clamp(15px,2.4vw,18px); }

  .tapzone{
    position:fixed;
    inset:0;
    z-index:5;
  }

  .hint{
    position:fixed;
    bottom:28px;
    left:0;right:0;
    text-align:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.15em;
    text-transform:uppercase;
    color:var(--dim);
    opacity:0.6;
    pointer-events:none;
  }

  .textfallback{
    position:fixed;
    bottom:0; left:0; right:0;
    display:none;
    padding:14px 16px calc(14px + env(safe-area-inset-bottom));
    background:rgba(15,13,23,0.9);
    backdrop-filter:blur(10px);
    gap:10px;
    z-index:10;
  }
  .textfallback.active{ display:flex; }
  .textfallback input{
    flex:1;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:10px;
    padding:12px 14px;
    color:var(--ink);
    font-family:'IBM Plex Sans',sans-serif;
    font-size:15px;
    outline:none;
  }
  .textfallback button{
    background:var(--violet);
    color:var(--ink);
    border:none;
    border-radius:10px;
    padding:0 18px;
    font-family:'IBM Plex Sans',sans-serif;
    font-weight:500;
    font-size:14px;
  }

  .mode-toggle{
    position:fixed;
    top:18px;
    right:18px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--dim);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:8px 12px;
    z-index:20;
    opacity:0.85;
    cursor:pointer;
  }
  .mode-toggle.on{
    color:var(--cyan);
    border-color:rgba(75,238,255,0.4);
    background:rgba(75,238,255,0.08);
  }

  .camera-toggle{
    position:fixed;
    top:18px;
    left:18px;
    font-family:'JetBrains Mono', monospace;
    font-size:10px;
    letter-spacing:0.15em;
    color:var(--dim);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:8px 12px;
    z-index:20;
    opacity:0.85;
    cursor:pointer;
  }
  .camera-toggle.on{
    color:var(--magenta);
    border-color:rgba(255,62,165,0.4);
    background:rgba(255,62,165,0.08);
  }
</style>
</head>
<body data-state="idle">

  <video id="mirrorVideo" class="mirror-video" autoplay playsinline muted></video>
  <div class="mirror-tint" id="mirrorTint"></div>
  <canvas id="captureCanvas" style="display:none;"></canvas>

  <div class="camera-toggle" id="cameraToggle">MIRROR CAM: OFF</div>
  <div class="mode-toggle" id="modeToggle">SAY "ALEX": OFF</div>

  <div class="stage">
    <div class="phantom-wrap">
      <svg class="phantom-svg" width="100%" viewBox="0 0 680 460" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="cfFinal"><circle cx="340" cy="230" r="190"/></clipPath>
          <linearGradient id="skinFinal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#e0a45c"/>
            <stop offset="100%" stop-color="#c97a3a"/>
          </linearGradient>
        </defs>
        <ellipse class="halo" cx="340" cy="230" rx="220" ry="220" fill="var(--violet)" opacity="0.12"/>
        <circle cx="340" cy="230" r="190" fill="#161033"/>
        <g clip-path="url(#cfFinal)" stroke="#0d0d0d" stroke-width="4.5" stroke-linejoin="round">
          <path d="M240 40 Q210 60 215 110 L230 460 L120 460 L110 60 Q160 30 240 40 Z" fill="#c62b3a"/>
          <path d="M230 60 Q290 40 330 90 Q350 150 320 220 Q300 280 250 300 Q210 280 210 220 Q205 130 230 60 Z" fill="url(#skinFinal)"/>
          <path d="M330 90 Q400 50 460 90 Q490 160 470 250 Q450 340 400 400 L420 460 L280 460 L250 300 Q300 280 320 220 Q350 150 330 90 Z" fill="#e6c48a"/>
          <path d="M355 145 Q330 260 348 400" fill="none" stroke="#0d0d0d" stroke-width="4" stroke-linecap="round"/>
          <path d="M348 150 Q300 128 238 152" fill="none" stroke="#0d0d0d" stroke-width="3.5" stroke-linecap="round"/>
          <path d="M362 140 Q405 110 440 138" fill="none" stroke="#0d0d0d" stroke-width="3.5" stroke-linecap="round"/>
          <ellipse cx="255" cy="165" rx="22" ry="12" fill="#d4568a" opacity="0.55" stroke="none" transform="rotate(-12 255 165)"/>
          <path d="M232 188 Q262 165 298 180 Q280 202 258 204 Q240 202 232 188 Z" fill="#f4ece0" stroke-width="3.5"/>
          <circle id="pupilL" cx="264" cy="182" r="7" fill="#0d0d0d" stroke="none" style="animation: glancePupil 9s ease-in-out infinite;"/>
          <path d="M234 186 Q262 172 296 182" fill="none" stroke="#0d0d0d" stroke-width="3" stroke-linecap="round"/>
          <path d="M365 160 Q398 140 438 155 Q420 178 395 180 Q378 178 365 160 Z" fill="#f4ece0" stroke-width="3.5"/>
          <circle id="pupilR" cx="399" cy="157" r="6.5" fill="#0d0d0d" stroke="none" style="animation: glancePupil 9s ease-in-out infinite;"/>
          <path d="M367 158 Q398 146 435 156" fill="none" stroke="#0d0d0d" stroke-width="3" stroke-linecap="round"/>
          <path d="M322 316 Q363 306 405 316 Q392 338 363 342 Q334 338 322 316 Z" fill="#a8182a" stroke-width="3"/>
          <path id="mouthLine" d="M330 325 Q364 323 398 325" fill="none" stroke="#0d0d0d" stroke-width="2.5" stroke-linecap="round"/>
          <path id="mouthGap" d="M349 325 Q364 325 379 325 Q364 325 349 325 Z" fill="#2a0a0c" stroke="none"/>
        </g>
        <circle cx="340" cy="230" r="188" fill="none" stroke="#0d0d0d" stroke-width="4"/>
      </svg>
    </div>
    <div class="status" id="status">STANDBY</div>
    <div class="transcript you" id="youText"></div>
    <div class="transcript" id="oracleText">Tap the avatar to ask something. Turn on the mirror cam if you want it to actually see you — say "save that" if you want to keep a shot.</div>
  </div>

  <div class="tapzone" id="tapzone"></div>
  <div class="hint">tap the avatar to ask · hold for text · left toggles camera · right toggles "alex"</div>

  <div class="textfallback" id="textFallback">
    <input id="textInput" type="text" placeholder="Ask the oracle..." autocomplete="off">
    <button id="textSend">Ask</button>
  </div>

  <style>
    @keyframes glancePupil {
      0%, 55%   { transform: translate(0, 0); }
      60%       { transform: translate(-5px, 1px); }
      75%       { transform: translate(4px, -1px); }
      85%, 100% { transform: translate(0, 0); }
    }
  </style>

  <script>
    // Avatar mouth-talk control, as provided — hooked into speak() below via
    // window.startTalking() / window.stopTalking()
    (function () {
      var talking = false, raf = null, t0 = 0;
      var gap = document.getElementById('mouthGap');
      var line = document.getElementById('mouthLine');

      function frame(ts) {
        if (!t0) t0 = ts;
        var e = (ts - t0) / 1000;
        var s = (Math.sin(e * 7) + 1) / 2;
        var off = 4 * s;
        gap.setAttribute('d', 'M349 325 Q364 ' + (325 - off) + ' 379 325 Q364 ' + (325 + off) + ' 349 325 Z');
        if (talking) raf = requestAnimationFrame(frame);
      }

      window.startTalking = function () {
        if (talking) return;
        talking = true;
        line.style.opacity = 0;
        t0 = 0;
        raf = requestAnimationFrame(frame);
      };

      window.stopTalking = function () {
        talking = false;
        if (raf) cancelAnimationFrame(raf);
        line.style.opacity = 1;
        gap.setAttribute('d', 'M349 325 Q364 325 379 325 Q364 325 349 325 Z');
      };
    })();
  </script>

<script>
  const body = document.body;
  const statusEl = document.getElementById('status');
  const youEl = document.getElementById('youText');
  const oracleEl = document.getElementById('oracleText');
  const tapzone = document.getElementById('tapzone');
  const textFallback = document.getElementById('textFallback');
  const textInput = document.getElementById('textInput');
  const textSend = document.getElementById('textSend');
  const modeToggle = document.getElementById('modeToggle');

  let history = [];
  let longPressTimer = null;
  let touchMoved = false;

  const mirrorVideo = document.getElementById('mirrorVideo');
  const mirrorTint = document.getElementById('mirrorTint');
  const captureCanvas = document.getElementById('captureCanvas');
  const cameraToggle = document.getElementById('cameraToggle');
  let cameraStream = null;
  let cameraOn = false;
  let lastCapturedFrame = null; // full-quality data URL of the most recent frame, for save requests

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const voiceSupported = !!SR;
  let recognition = null;

  let wakeWordMode = false;   // is the "say Alex" loop turned on
  let awaitingQuery = false;  // heard "alex" alone, now capturing the follow-up as the question
  let busy = false;           // thinking or speaking — recognition is intentionally paused
  let restartTimer = null;

  if (!voiceSupported) {
    modeToggle.textContent = 'VOICE UNAVAILABLE — TAP TO TYPE';
  }

  function setState(state, label){
    body.dataset.state = state;
    statusEl.textContent = label;
  }

  // ---------- one-shot manual listen (orb tap) ----------
  function startOneShotListen(){
    if (!voiceSupported) { openTextFallback(); return; }
    if (busy) return;

    const wasWaking = wakeWordMode;
    if (wasWaking) pauseWakeLoop();

    youEl.textContent = '';
    oracleEl.textContent = '';
    speechSynthesis.cancel();
    if (window.stopTalking) window.stopTalking();

    const oneShot = new SR();
    oneShot.continuous = false;
    oneShot.interimResults = false;
    oneShot.lang = 'en-US';
    oneShot.onstart = () => setState('listening', 'LISTENING');
    oneShot.onerror = (e) => {
      setState('idle', 'STANDBY');
      if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
        oracleEl.textContent = "Microphone access is blocked. Allow it in the browser's site settings, or hold to type.";
      }
      if (wasWaking) resumeWakeLoop();
    };
    oneShot.onend = () => {
      if (body.dataset.state === 'listening') setState('idle', 'STANDBY');
    };
    oneShot.onresult = (e) => {
      const heard = e.results[0][0].transcript;
      submitVoiceQuery(heard, wasWaking);
    };
    try { oneShot.start(); } catch(e) {}
  }

  // ---------- wake word loop ("alex") ----------
  function toggleWakeWord(){
    if (!voiceSupported) { openTextFallback(); return; }
    wakeWordMode = !wakeWordMode;
    if (wakeWordMode) {
      modeToggle.textContent = 'SAY "ALEX": ON';
      modeToggle.classList.add('on');
      awaitingQuery = false;
      busy = false;
      oracleEl.textContent = 'Listening for "Alex."';
      startWakeRecognitionSession();
    } else {
      modeToggle.textContent = 'SAY "ALEX": OFF';
      modeToggle.classList.remove('on');
      pauseWakeLoop();
      setState('idle', 'STANDBY');
    }
  }

  function startWakeRecognitionSession(){
    if (!voiceSupported || !wakeWordMode) return;
    try { if (recognition) recognition.abort(); } catch(e) {}
    recognition = new SR();
    recognition.continuous = true;
    recognition.interimResults = false;
    recognition.lang = 'en-US';
    recognition.onresult = onWakeResult;
    recognition.onerror = onWakeError;
    recognition.onend = onWakeEnd;
    setState(awaitingQuery ? 'listening' : 'passive', awaitingQuery ? 'LISTENING...' : 'LISTENING FOR "ALEX"');
    try { recognition.start(); } catch(e) {}
  }

  function pauseWakeLoop(){
    clearTimeout(restartTimer);
    if (recognition) {
      try { recognition.onend = null; recognition.abort(); } catch(e) {}
    }
  }

  function resumeWakeLoop(){
    if (wakeWordMode && !busy) startWakeRecognitionSession();
  }

  function onWakeResult(e){
    for (let i = e.resultIndex; i < e.results.length; i++){
      if (!e.results[i].isFinal) continue;
      const transcript = e.results[i][0].transcript.trim();
      const lower = transcript.toLowerCase();

      if (awaitingQuery){
        awaitingQuery = false;
        submitVoiceQuery(transcript, true);
        return;
      }

      const match = lower.match(/\balex\b[,.\s]*(.*)/);
      if (match){
        const remainder = match[1].trim();
        if (remainder.length > 2){
          submitVoiceQuery(remainder, true);
        } else {
          awaitingQuery = true;
          setState('listening', 'LISTENING...');
        }
        return;
      }
    }
  }

  function onWakeError(e){
    if (e.error === 'not-allowed' || e.error === 'service-not-allowed'){
      wakeWordMode = false;
      modeToggle.textContent = 'SAY "ALEX": OFF';
      modeToggle.classList.remove('on');
      setState('idle', 'STANDBY');
      oracleEl.textContent = "Microphone access is blocked, so the wake word can't run. Allow mic access in the browser's site settings.";
    }
    // other errors (no-speech, network hiccup) are handled by the onend restart below
  }

  function onWakeEnd(){
    if (wakeWordMode && !busy){
      restartTimer = setTimeout(() => { if (wakeWordMode && !busy) startWakeRecognitionSession(); }, 300);
    }
  }

  // ---------- mirror camera ----------
  async function toggleCamera(){
    if (cameraOn) {
      stopCamera();
      return;
    }
    try {
      cameraStream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 960 } },
        audio: false
      });
      mirrorVideo.srcObject = cameraStream;
      cameraOn = true;
      mirrorVideo.classList.add('active');
      mirrorTint.classList.add('active');
      cameraToggle.textContent = 'MIRROR CAM: ON';
      cameraToggle.classList.add('on');
    } catch (err) {
      oracleEl.textContent = "Couldn't reach the camera. Check that camera access is allowed for this page in the browser's site settings — it also needs to be opened over https, not as a downloaded file.";
    }
  }

  function stopCamera(){
    if (cameraStream) {
      cameraStream.getTracks().forEach(t => t.stop());
      cameraStream = null;
    }
    mirrorVideo.srcObject = null;
    cameraOn = false;
    mirrorVideo.classList.remove('active');
    mirrorTint.classList.remove('active');
    cameraToggle.textContent = 'MIRROR CAM: OFF';
    cameraToggle.classList.remove('on');
  }

  function captureFrameDataUrl(){
    if (!cameraOn || !mirrorVideo.videoWidth) return null;
    const maxWidth = 1000;
    const scale = Math.min(1, maxWidth / mirrorVideo.videoWidth);
    captureCanvas.width = mirrorVideo.videoWidth * scale;
    captureCanvas.height = mirrorVideo.videoHeight * scale;
    const ctx = captureCanvas.getContext('2d');
    ctx.drawImage(mirrorVideo, 0, 0, captureCanvas.width, captureCanvas.height);
    return captureCanvas.toDataURL('image/jpeg', 0.85);
  }

  function fallbackDownload(dataUrl, filename){
    const a = document.createElement('a');
    a.href = dataUrl;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
  }

  function triggerSaveImage(dataUrl){
    const filename = `mirror-outfit-${Date.now()}.jpg`;
    if (navigator.canShare) {
      fetch(dataUrl).then(res => res.blob()).then(blob => {
        const file = new File([blob], filename, { type: 'image/jpeg' });
        if (navigator.canShare({ files: [file] })) {
          navigator.share({ files: [file], title: 'Mirror outfit check' }).catch(() => fallbackDownload(dataUrl, filename));
        } else {
          fallbackDownload(dataUrl, filename);
        }
      }).catch(() => fallbackDownload(dataUrl, filename));
    } else {
      fallbackDownload(dataUrl, filename);
    }
  }

  function isSaveCommand(text){
    return /\bsave\b/i.test(text) && (cameraOn || lastCapturedFrame);
  }

  cameraToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleCamera(); });


  // ---------- shared query handling ----------
  function submitVoiceQuery(text, resumeWakeAfter){
    busy = true;
    pauseWakeLoop();
    handleQuery(text, resumeWakeAfter);
  }

  function openTextFallback(){
    textFallback.classList.add('active');
    textInput.focus();
  }
  function closeTextFallback(){
    textFallback.classList.remove('active');
    textInput.value = '';
  }

  tapzone.addEventListener('click', () => {
    if (textFallback.classList.contains('active')) return;
    startOneShotListen();
  });

  tapzone.addEventListener('touchstart', () => {
    touchMoved = false;
    longPressTimer = setTimeout(() => { openTextFallback(); }, 550);
  });
  tapzone.addEventListener('touchmove', () => { touchMoved = true; clearTimeout(longPressTimer); });
  tapzone.addEventListener('touchend', () => { clearTimeout(longPressTimer); });
  tapzone.addEventListener('mousedown', () => {
    longPressTimer = setTimeout(() => { openTextFallback(); }, 550);
  });
  tapzone.addEventListener('mouseup', () => { clearTimeout(longPressTimer); });

  modeToggle.addEventListener('click', (e) => { e.stopPropagation(); toggleWakeWord(); });

  textSend.addEventListener('click', submitText);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') submitText();
    if (e.key === 'Escape') closeTextFallback();
  });

  function submitText(){
    const val = textInput.value.trim();
    if (!val) { closeTextFallback(); return; }
    closeTextFallback();
    busy = true;
    pauseWakeLoop();
    handleQuery(val, wakeWordMode);
  }

  async function handleQuery(query, resumeWakeAfter){
    youEl.textContent = query;
    oracleEl.textContent = '';

    if (isSaveCommand(query)) {
      setState('thinking', 'SAVING');
      let toSave = lastCapturedFrame;
      if (!toSave && cameraOn) {
        toSave = captureFrameDataUrl();
        lastCapturedFrame = toSave;
      }
      const reply = toSave
        ? "Saving that now. Look for a share sheet, or check Downloads if it saves straight through."
        : "I don't have a frame to save yet — turn on the mirror cam and ask again once it can see you.";
      if (toSave) triggerSaveImage(toSave);
      oracleEl.textContent = reply;
      speak(reply, resumeWakeAfter);
      return;
    }

    setState('thinking', 'THINKING');

    const frameDataUrl = captureFrameDataUrl();
    if (frameDataUrl) lastCapturedFrame = frameDataUrl;
    const frameBase64 = frameDataUrl ? frameDataUrl.split(',')[1] : null;

    const outgoingUserMessage = frameBase64
      ? { role: 'user', content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: frameBase64 } },
            { type: 'text', text: query }
          ] }
      : { role: 'user', content: query };

    const messagesToSend = [...history, outgoingUserMessage];

    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 400,
          system: "You are a wall-mounted household oracle: warm, a little wry, concise. Speak in short spoken-friendly sentences, no markdown, no lists, no headers, nothing that doesn't read naturally aloud. Two to four sentences unless the person clearly wants more detail. If an image is included, it's a live camera frame of the person standing in front of the mirror right now — look at it and answer with that in mind, as naturally as if you could actually see them.",
          messages: messagesToSend
        })
      });
      const data = await response.json();
      const textBlock = (data.content || []).map(c => c.text || '').join(' ').trim();
      const reply = textBlock || "I didn't catch a usable answer that time. Try asking again.";

      // Keep history text-only so old camera frames aren't resent on every later turn
      history.push({ role: 'user', content: query });
      history.push({ role: 'assistant', content: reply });
      oracleEl.textContent = reply;
      speak(reply, resumeWakeAfter);
    } catch(err) {
      busy = false;
      setState('idle', 'STANDBY');
      oracleEl.textContent = "Couldn't reach the oracle. Check the tablet's connection.";
      if (resumeWakeAfter) resumeWakeLoop();
    }
  }

  function speak(text, resumeWakeAfter){
    if (!('speechSynthesis' in window)) {
      busy = false;
      setState('idle', 'STANDBY');
      if (resumeWakeAfter) resumeWakeLoop();
      return;
    }
    speechSynthesis.cancel();
    if (window.stopTalking) window.stopTalking();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = 1.0;
    utter.pitch = 1.0;
    utter.onstart = () => {
      setState('speaking', 'SPEAKING');
      if (window.startTalking) window.startTalking();
    };
    utter.onend = () => {
      busy = false;
      setState('idle', 'STANDBY');
      if (window.stopTalking) window.stopTalking();
      if (resumeWakeAfter) resumeWakeLoop();
    };
    utter.onerror = () => {
      busy = false;
      setState('idle', 'STANDBY');
      if (window.stopTalking) window.stopTalking();
      if (resumeWakeAfter) resumeWakeLoop();
    };
    speechSynthesis.speak(utter);
  }
</script>
